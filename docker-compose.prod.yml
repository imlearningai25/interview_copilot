# Production overrides — apply on top of docker-compose.yml:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# For GCP Cloud Run, images are pulled from Artifact Registry instead.
# This file is used for local prod-parity smoke testing.

version: '3.9'

services:
  db:
    ports: []           # not exposed in prod

  backend:
    build:
      target: production
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://yourdomain.com}
      ENVIRONMENT: production
    volumes: []          # no source mounts in prod
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
      restart_policy:
        condition: on-failure
        max_attempts: 3

  frontend:
    build:
      target: production
      args:
        VITE_API_URL: ${VITE_API_URL:-""}
    restart: always
    volumes: []
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
